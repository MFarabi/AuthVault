<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Shield shape -->
  <path d="M256 96 L380 148 C380 148 392 280 256 400 C120 280 132 148 132 148 Z"
        fill="none" stroke="white" stroke-width="24" stroke-linejoin="round" opacity="0.95"/>

  <!-- Vault keyhole circle -->
  <circle cx="256" cy="228" r="48" fill="white" opacity="0.95"/>

  <!-- Keyhole inner -->
  <circle cx="256" cy="220" r="18" fill="#6366f1"/>
  <polygon points="244,228 256,296 268,228" fill="#6366f1" rx="4"/>

  <!-- Small lock bar at top of keyhole -->
  <rect x="240" y="196" width="32" height="8" rx="4" fill="#6366f1" opacity="0.3"/>
</svg>
